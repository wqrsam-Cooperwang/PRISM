name: Autoformat Python

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/autoformat.yml"
      - "src/**/*.py"
      - "tests/**/*.py"
      - "pyproject.toml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Apply Ruff formatter
        run: ruff format .

      - name: Apply Ruff safe fixes
        run: ruff check --fix .

      - name: Verify Ruff
        run: |
          ruff format --check .
          ruff check .

      - name: Commit formatter changes
        run: |
          if git diff --quiet; then
            echo "No formatting changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src tests
          git commit -m "style: apply Ruff formatter"
          git push
