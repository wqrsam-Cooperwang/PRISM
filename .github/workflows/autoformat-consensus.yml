name: Autoformat Consensus Engine

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/autoformat-consensus.yml"
      - "src/domain/models.py"
      - "src/confidence/engine.py"
      - "src/consensus/**/*.py"
      - "tests/test_consensus_engine.py"
      - "tests/test_consensus_models.py"
      - "tests/test_consensus_integration.py"
      - "tests/test_pipeline_integration.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Format consensus files
        run: |
          ruff format src/domain/models.py src/confidence/engine.py src/consensus tests/test_consensus_engine.py tests/test_consensus_models.py tests/test_consensus_integration.py tests/test_pipeline_integration.py

      - name: Verify formatting
        run: |
          ruff format --check src/domain/models.py src/confidence/engine.py src/consensus tests/test_consensus_engine.py tests/test_consensus_models.py tests/test_consensus_integration.py tests/test_pipeline_integration.py

      - name: Commit formatter changes
        run: |
          if git diff --quiet -- src/domain/models.py src/confidence/engine.py src/consensus tests/test_consensus_engine.py tests/test_consensus_models.py tests/test_consensus_integration.py tests/test_pipeline_integration.py; then
            echo "No formatting changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/domain/models.py src/confidence/engine.py src/consensus tests/test_consensus_engine.py tests/test_consensus_models.py tests/test_consensus_integration.py tests/test_pipeline_integration.py
          git commit -m "style: apply Ruff formatter to consensus engine"
          git push
