name: Autoformat Orchestrator

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/autoformat-orchestrator.yml"
      - "specs/orchestrator.md"
      - "src/runtime/**/*.py"
      - "tests/test_orchestrator.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Format orchestrator files
        run: |
          ruff format specs/orchestrator.md src/runtime tests/test_orchestrator.py

      - name: Verify formatting
        run: |
          ruff format --check specs/orchestrator.md src/runtime tests/test_orchestrator.py

      - name: Commit formatter changes
        run: |
          if git diff --quiet -- specs/orchestrator.md src/runtime tests/test_orchestrator.py; then
            echo "No formatting changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add specs/orchestrator.md src/runtime tests/test_orchestrator.py
          git commit -m "style: apply Ruff formatter to orchestrator"
          git push
