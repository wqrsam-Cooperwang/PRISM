name: Autoformat Confidence Tests

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/autoformat-confidence.yml"
      - "tests/test_confidence_engine.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Format confidence tests
        run: ruff format tests/test_confidence_engine.py

      - name: Verify formatting
        run: ruff format --check tests/test_confidence_engine.py

      - name: Commit formatter changes
        run: |
          if git diff --quiet -- tests/test_confidence_engine.py; then
            echo "No formatting changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/test_confidence_engine.py
          git commit -m "style: apply Ruff formatter to confidence tests"
          git push
