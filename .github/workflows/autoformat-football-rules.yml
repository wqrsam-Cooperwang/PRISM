name: Autoformat Football Rules

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/autoformat-football-rules.yml"
      - "src/rules/engine.py"
      - "src/rules/models.py"
      - "src/rules/football.py"
      - "tests/test_rule_engine.py"
      - "tests/test_football_rules.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Format football rule files
        run: |
          ruff format src/rules/engine.py src/rules/models.py src/rules/football.py tests/test_rule_engine.py tests/test_football_rules.py

      - name: Verify formatting
        run: |
          ruff format --check src/rules/engine.py src/rules/models.py src/rules/football.py tests/test_rule_engine.py tests/test_football_rules.py

      - name: Commit formatter changes
        run: |
          if git diff --quiet -- src/rules/engine.py src/rules/models.py src/rules/football.py tests/test_rule_engine.py tests/test_football_rules.py; then
            echo "No formatting changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/rules/engine.py src/rules/models.py src/rules/football.py tests/test_rule_engine.py tests/test_football_rules.py
          git commit -m "style: apply Ruff formatter to football rules"
          git push
